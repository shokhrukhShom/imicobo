<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iMicobo · Receiver</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0a0c10">

<style>
  :root{
    --bg:#0a0c10; --panel:#141922; --panel2:#1b2230; --line:#2a3340;
    --ink:#e8eef5; --dim:#8593a5; --accent:#5eead4; --ok:#4ade80;
    --warn:#fbbf24; --bad:#f87171;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);
    font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:grid;place-items:center;padding:32px}
  .wrap{width:min(560px,100%);text-align:center}
  .brand{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
  h1{font-size:30px;font-weight:650;margin:0 0 6px}
  .sub{color:var(--dim);font-size:15px;margin:0 0 30px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:34px 28px}
  .lbl{color:var(--dim);font-size:14px}
  .code{font:700 66px var(--mono);letter-spacing:14px;margin:10px 0 4px;color:var(--accent)}
  .qr{margin:18px auto 6px;width:220px;height:220px;background:#fff;
    border-radius:14px;padding:10px;display:none}
  .qr.show{display:block}
  .qr svg{display:block;width:100%;height:100%}
  .or{color:var(--dim);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin:16px 0 2px}
  .code.waiting{color:var(--dim);opacity:.35}
  .hint{color:var(--dim);font-size:14px;margin-top:6px}
  .btns{display:flex;gap:10px;justify-content:center;margin-top:24px}
  button{font:600 15px inherit;border:none;border-radius:11px;padding:13px 26px;cursor:pointer;transition:.15s}
  .pair{background:var(--accent);color:#06231f}
  .pair:hover{filter:brightness(1.08)}
  .cancel{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
  button:disabled{opacity:.35;cursor:not-allowed}
  .status{display:inline-flex;align-items:center;gap:8px;margin-top:24px;font-size:14px;color:var(--dim)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--dim)}
  .dot.ok{background:var(--ok);box-shadow:0 0 10px var(--ok)}
  .dot.mid{background:var(--warn)} .dot.bad{background:var(--bad)}
  .live{display:none} .live.show{display:block}
  .meter{height:14px;background:#080a0e;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:20px}
  .meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),#22d3ee);transition:width .06s linear}
  .meter i.clip{background:linear-gradient(90deg,var(--warn),var(--bad))}
  .stats{display:flex;gap:10px;margin-top:16px}
  .stat{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim)}
  .stat .v{font:600 16px var(--mono);margin-top:2px}
  .fx{margin-top:16px;font-size:13px;color:var(--dim);font-family:var(--mono)}
  .quality{display:none;margin-top:16px;padding:12px 14px;border-radius:10px;
    font-size:13px;text-align:left;line-height:1.45;border:1px solid var(--line)}
  .quality.show{display:block}
  .quality.good{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.35);color:#bbf7d0}
  .quality.fair{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.35);color:#fde68a}
  .quality.poor{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.4);color:#fecaca}
  .quality b{display:block;margin-bottom:2px}
  .muted{color:var(--warn);font-size:14px;margin-top:12px;display:none}
  .muted.show{display:block}
  .unlock{display:none;margin-top:16px;width:100%;background:var(--accent);color:#06231f}
  .unlock.show{display:block}
  audio{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">iMicobo</div>
  <h1 id="title">Waiting for your iPhone</h1>
  <p class="sub" id="subtitle">Open iMicobo on your phone — it will find this screen automatically.</p>

  <div class="card" id="pairCard">
    <div class="lbl">Scan with the iMicobo app</div>
    <div class="qr" id="qr"></div>
    <div class="or">or enter this code</div>
    <div class="code waiting" id="code">– – – –</div>
    <div class="hint" id="hint">Open iMicobo on your phone, then scan or type.</div>
    <div class="btns">
      <button class="cancel" onclick="newCode()">New code</button>
    </div>
  </div>

  <div class="card live" id="liveCard">
    <div class="lbl">Microphone is live</div>
    <div class="meter"><i id="meter"></i></div>
    <div class="muted" id="mutedMsg">🔇 Muted from the phone</div>
    <button class="unlock" id="unlock" onclick="unlockAudio()">✨ Click to turn on effects</button>
    <div class="fx" id="fxLine">clean</div>
    <div class="stats">
      <div class="stat"><div class="k">Round trip</div><div class="v" id="rtt">—</div></div>
      <div class="stat"><div class="k">Jitter</div><div class="v" id="jit">—</div></div>
    </div>
    <div class="quality" id="quality"></div>
    <div class="btns"><button class="cancel" onclick="newCode()">Disconnect</button></div>
  </div>

  <div class="status"><span class="dot" id="dot"></span><span id="statusText">Starting…</span></div>
  <audio id="audio" autoplay></audio>
</div>

<script src="qr.js"></script>
<script>
const CFG={iceServers:[{urls:'stun:stun.l.google.com:19302'}]};
let pc=null, myCode=null, live=false, poll=null, wantsFX=false;
const $=id=>document.getElementById(id);
function setStatus(t,c){$('statusText').textContent=t;$('dot').className='dot'+(c?' '+c:'');}

/* ────────────────────────────────────────────────────────────────
   AUDIO EFFECTS CHAIN (Web Audio API)

   mic ─▶ inputGain ─▶ EQ (bass▸mid▸treble) ─▶ compressor ─┬─▶ dry ─────┐
                                                            ├─▶ reverb ─┤─▶ out ─▶ speakers
                                                            └─▶ echo ───┘
   The phone sends knob positions over a data channel; we just set values.
   ──────────────────────────────────────────────────────────────── */
const FX = {
  ctx:null, nodes:null,

  build(stream){
    const ctx = new (window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
    const src = ctx.createMediaStreamSource(stream);

    const inputGain  = ctx.createGain();
    const bass       = ctx.createBiquadFilter();
    const mid        = ctx.createBiquadFilter();
    const treble     = ctx.createBiquadFilter();
    const comp       = ctx.createDynamicsCompressor();
    const dry        = ctx.createGain();
    const reverbWet  = ctx.createGain();
    const echoWet    = ctx.createGain();
    const convolver  = ctx.createConvolver();
    const delay      = ctx.createDelay(1.0);
    const feedback   = ctx.createGain();
    const out        = ctx.createGain();
    const master     = ctx.createGain();   // 0 until FX takes over from <audio>
    const analyser   = ctx.createAnalyser(); analyser.fftSize = 256;

    bass.type='lowshelf';    bass.frequency.value=200;
    mid.type='peaking';      mid.frequency.value=1200; mid.Q.value=0.9;
    treble.type='highshelf'; treble.frequency.value=3500;

    // gentle vocal compression — evens out loud/quiet singing
    comp.threshold.value=-24; comp.knee.value=24; comp.ratio.value=3;
    comp.attack.value=0.005;  comp.release.value=0.2;

    convolver.buffer = this.impulse(ctx, 1.8, 2.0);   // default room
    delay.delayTime.value = 0.22;
    feedback.gain.value   = 0.3;
    delay.connect(feedback); feedback.connect(delay);  // echo repeats

    // wire it up
    src.connect(inputGain);
    inputGain.connect(bass); bass.connect(mid); mid.connect(treble); treble.connect(comp);
    comp.connect(dry);        dry.connect(out);
    comp.connect(convolver);  convolver.connect(reverbWet); reverbWet.connect(out);
    comp.connect(delay);      delay.connect(echoWet);       echoWet.connect(out);
    out.connect(analyser);
    out.connect(master);
    master.connect(ctx.destination);

    dry.gain.value=1; reverbWet.gain.value=0; echoWet.gain.value=0; out.gain.value=1;
    master.gain.value = 0;      // <audio> is doing the playing for now

    this.ctx = ctx;
    this.nodes = {inputGain,bass,mid,treble,comp,dry,reverbWet,echoWet,convolver,delay,feedback,out,master,analyser};
    ctx.resume().then(activateFX).catch(()=>{});
    checkAudioUnlocked();
    return analyser;
  },

  /** Synthesize a reverb impulse response — no audio file needed. */
  impulse(ctx, seconds, decay){
    const rate = ctx.sampleRate, len = Math.max(1, Math.floor(rate*seconds));
    const buf = ctx.createBuffer(2, len, rate);
    for(let ch=0; ch<2; ch++){
      const d = buf.getChannelData(ch);
      for(let i=0;i<len;i++){
        d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, decay);
      }
    }
    return buf;
  },

  /** Apply params sent from the phone. All values 0..1 unless noted. */
  apply(p){
    if(!this.nodes) return;
    const n=this.nodes, t=this.ctx.currentTime, set=(param,v)=>param.setTargetAtTime(v,t,0.02);

    if(p.volume   != null) set(n.out.gain, p.volume * 2);          // 0..2x
    if(p.reverb   != null) set(n.reverbWet.gain, p.reverb * 0.9);
    if(p.echo     != null) set(n.echoWet.gain,   p.echo   * 0.6);
    if(p.echoTime != null) set(n.delay.delayTime, 0.08 + p.echoTime*0.5);
    if(p.echoFeed != null) set(n.feedback.gain,   p.echoFeed*0.75);
    if(p.bass     != null) set(n.bass.gain,   (p.bass  -0.5)*24);  // ±12 dB
    if(p.mid      != null) set(n.mid.gain,    (p.mid   -0.5)*24);
    if(p.treble   != null) set(n.treble.gain, (p.treble-0.5)*24);
    if(p.compress != null) set(n.comp.ratio, p.compress ? 4 : 1);
    if(p.reverbSize != null){
      n.convolver.buffer = this.impulse(this.ctx, 0.4 + p.reverbSize*3.0, 2.0);
    }
    // keep the dry path complementary to the wet ones so it never gets muddy
    const wet = (p.reverb??0)*0.9 + (p.echo??0)*0.6;
    set(n.dry.gain, Math.max(0.35, 1 - wet*0.45));
  }
};

async function boot(){
  try{
    const kept = localStorage.getItem('imicobo.screencode') || '';
    const s = await (await fetch('/session' + (kept ? `?code=${encodeURIComponent(kept)}` : ''),
                                 {method:'POST'})).json();
    myCode = s.code;
    localStorage.setItem('imicobo.screencode', myCode);
    $('code').textContent = myCode.split('').join(' ');
    $('code').classList.remove('waiting');

    // The QR carries the relay host too, so scanning skips discovery entirely.
    // In production this is just imicobo.com — same shape, no code change.
    try{
      const payload = `imicobo://pair?h=${location.host}&c=${myCode}`;
      $('qr').innerHTML = QR.svg(payload, 220);
      $('qr').classList.add('show');
    }catch(e){ /* code entry still works */ }

    setStatus('Waiting for your phone…','mid');
    poll = setInterval(checkSession, 900);
  }catch(e){ setStatus('Relay not reachable — is relay.py running?','bad'); }
}

/** Poll until the phone submits this code, then start the handshake. */
async function checkSession(){
  if(live || !myCode) return;
  try{
    const s = await (await fetch(`/session?code=${myCode}`)).json();
    if(!s.active){ setStatus('This code expired — get a new one','bad'); return; }
    if(s.joined && !pc){
      $('hint').textContent = 'Phone connected — starting audio…';
      startWebRTC();
    }
  }catch(e){}
}

async function newCode(){
  if(myCode) await fetch(`/cancel?code=${myCode}`,{method:'POST'});
  location.reload();
}
async function cancelPair(){ await newCode(); }

async function startWebRTC(){
  setStatus('Connecting…','mid');
  pc=new RTCPeerConnection(CFG);

  // effect knobs arrive here from the phone
  pc.ondatachannel = e => {
    e.channel.onmessage = m => {
      try{
        const p = JSON.parse(m.data);
        wantsFX = (p.reverb>0.02) || (p.echo>0.02)
               || (p.bass!=null   && Math.abs(p.bass-0.5)>0.03)
               || (p.mid!=null    && Math.abs(p.mid-0.5)>0.03)
               || (p.treble!=null && Math.abs(p.treble-0.5)>0.03);
        FX.apply(p);
        describeFX(p);
        unlockAudio();
        checkAudioUnlocked();
        // The phone reports its own mute state — never infer it from silence.
        if(p.muted != null) $('mutedMsg').classList.toggle('show', !!p.muted);
      }catch(_){}
    };
  };

  pc.ontrack=e=>{
    try{const r=pc.getReceivers().find(x=>x.track&&x.track.kind==='audio');
        if(r){ if('jitterBufferTarget' in r) r.jitterBufferTarget=0;
               if('playoutDelayHint' in r)  r.playoutDelayHint=0; }}catch(_){}

    /* A WebRTC stream IS allowed to autoplay through an <audio> element — it's
       only the Web Audio context that needs a user gesture. So play the raw
       audio right away (zero clicks), and swap to the effects chain silently
       the moment the context is allowed to run. */
    const a=$('audio'); a.srcObject=e.streams[0]; a.muted=false; a.play().catch(()=>{});

    const analyser = FX.build(e.streams[0]);
    meter(analyser);
  };

  pc.onconnectionstatechange=()=>{
    const s=pc.connectionState;
    if(s==='connected') goLive();
    else if(s==='failed') setStatus('Connection failed','bad');
  };

  let offer=null;
  for(let i=0;i<60 && !offer;i++){
    const d=await(await fetch(`/offer?code=${myCode}`)).json();
    if(d.sdp) offer=JSON.parse(d.sdp);
    else await new Promise(r=>setTimeout(r,500));
  }
  if(!offer){ setStatus('No offer from phone','bad'); return; }

  await pc.setRemoteDescription(offer);
  const ans=await pc.createAnswer();
  await pc.setLocalDescription(ans);
  await iceDone(pc);
  await fetch(`/answer?code=${myCode}`,{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(pc.localDescription)});
}

function describeFX(p){
  const bits=[];
  if(p.reverb>0.02) bits.push(`reverb ${Math.round(p.reverb*100)}%`);
  if(p.echo>0.02)   bits.push(`echo ${Math.round(p.echo*100)}%`);
  if(p.bass!=null   && Math.abs(p.bass-0.5)>0.03)   bits.push(`bass ${p.bass>0.5?'+':''}${Math.round((p.bass-0.5)*24)}dB`);
  if(p.treble!=null && Math.abs(p.treble-0.5)>0.03) bits.push(`treble ${p.treble>0.5?'+':''}${Math.round((p.treble-0.5)*24)}dB`);
  $('fxLine').textContent = bits.length ? bits.join(' · ') : 'clean';
}

function iceDone(pc){
  return new Promise(res=>{
    if(pc.iceGatheringState==='complete')return res();
    const c=()=>{if(pc.iceGatheringState==='complete'){pc.removeEventListener('icegatheringstatechange',c);res();}};
    pc.addEventListener('icegatheringstatechange',c);
    setTimeout(res,4000);
  });
}

function goLive(){
  live=true; clearInterval(poll);
  $('pairCard').style.display='none';
  $('liveCard').classList.add('show');
  $('title').textContent='Connected';
  $('subtitle').textContent='Your iPhone is now a microphone for this screen.';
  setStatus('Live','ok');
  setInterval(stats,1000);
}

function meter(analyser){
  const buf=new Uint8Array(analyser.frequencyBinCount), bar=$('meter');
  (function draw(){
    analyser.getByteFrequencyData(buf);
    let s=0; for(const v of buf) s+=v;
    const lvl=s/buf.length;
    bar.style.width=Math.min(100,lvl*1.6)+'%';
    bar.classList.toggle('clip', lvl*1.6 > 92);   // too close to the mic
    requestAnimationFrame(draw);
  })();
}

/* Connection quality.

   We can't read the Wi-Fi band — iOS and browsers don't expose it. But the band
   was only ever a proxy for the thing that actually hurts: JITTER. Unstable
   arrival times force WebRTC to grow its buffer, and that buffer IS the lag.
   So we judge the symptom directly. A clean 2.4GHz link is fine; a congested
   5GHz one is not. Jitter tells the truth either way.

   NOTE: thresholds below are provisional — retune them once you have a
   baseline from a quiet 5GHz network.                                        */
const JITTER_GOOD = 10;   // ms — feels live
const JITTER_FAIR = 30;   // ms — usable, some wobble
const history = [];       // rolling ~12s of jitter samples

function judge(){
  if(history.length < 5) return;                       // need a few seconds first
  const recent = history.slice(-12);
  const avg  = recent.reduce((a,b)=>a+b,0) / recent.length;
  const peak = Math.max(...recent);
  const el = $('quality');

  let cls, title, body;
  if(avg <= JITTER_GOOD && peak <= JITTER_FAIR){
    cls='good'; title='Connection is solid';
    body='Your voice should feel live with no noticeable delay.';
  } else if(avg <= JITTER_FAIR){
    cls='fair'; title='Connection is a little unsteady';
    body='You may notice slight delay. Move closer to the router, or use a 5GHz network if you have one.';
  } else {
    cls='poor'; title='Your Wi-Fi is congested';
    body='This adds delay to your voice — it is the network, not the mic. Try a 5GHz network, move closer to the router, '
       + 'or wire this computer to the router with Ethernet.';
  }
  el.className = 'quality show ' + cls;
  el.innerHTML = `<b>${title}</b>${body}`;
}

async function stats(){
  if(!pc||pc.connectionState!=='connected')return;
  const st=await pc.getStats(); let rtt=null,jit=null;
  st.forEach(r=>{
    if(r.type==='candidate-pair'&&r.nominated&&r.currentRoundTripTime!=null)rtt=r.currentRoundTripTime;
    if(r.type==='inbound-rtp'&&r.kind==='audio'&&r.jitter!=null)jit=r.jitter;
  });
  $('rtt').textContent=rtt!=null?(rtt*1000).toFixed(0)+' ms':'—';
  $('jit').textContent=jit!=null?(jit*1000).toFixed(1)+' ms':'—';

  if(jit!=null){
    history.push(jit*1000);
    if(history.length>40) history.shift();
    judge();
  }
}

/* Sound plays immediately via the <audio> element. Effects need a running
   AudioContext, which browsers gate behind a user gesture — so we hand over
   from <audio> to the FX chain as soon as that's allowed. */
let usingFX = false;

function activateFX(){
  if(usingFX || !FX.ctx || FX.ctx.state !== 'running' || !FX.nodes) return;
  usingFX = true;
  $('audio').muted = true;                        // FX chain takes over output
  FX.nodes.master.gain.value = 1;
  checkAudioUnlocked();
}

function checkAudioUnlocked(){
  const btn = $('unlock');
  if(!FX.ctx || usingFX){ btn.classList.remove('show'); return; }
  // Only nag if effects are actually wanted but can't run yet.
  btn.classList.toggle('show', wantsFX);
}

function unlockAudio(){
  if(!FX.ctx) return;
  FX.ctx.resume().then(activateFX).catch(()=>{});
}

['click','keydown','touchstart','pointerdown'].forEach(ev =>
  document.addEventListener(ev, () => { if(!usingFX) unlockAudio(); })
);
setInterval(() => { if(!usingFX) unlockAudio(); }, 2000);

boot();
</script>
</body>
</html>
